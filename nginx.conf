# nginx reverse proxy config for mezen.co
# Place at: /etc/nginx/sites-available/mezen.co
# Then: ln -s /etc/nginx/sites-available/mezen.co /etc/nginx/sites-enabled/
# And:  certbot --nginx -d mezen.co -d www.mezen.co

server {
    listen 80;
    server_name mezen.co www.mezen.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mezen.co www.mezen.co;

    # Certificates managed by certbot
    ssl_certificate /etc/letsencrypt/live/mezen.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mezen.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # www → non-www redirect
    if ($host = www.mezen.co) {
        return 301 https://mezen.co$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
