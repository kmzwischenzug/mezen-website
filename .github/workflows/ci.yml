name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://mezen.co
          # Required env vars stubbed for CI build — real values set in Vercel
          RESEND_API_KEY: ci_placeholder
          CONTACT_EMAIL_TO: hello@mezen.co
          CONTACT_EMAIL_FROM: no-reply@mezen.co
